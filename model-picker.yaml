# model-picker.yaml — canonical model routing for Hermes Agent
# PROBED: 2026-07-23 ~18:30 UTC | 57 Zen + 23 Go models tested
# RULE: no model string hardcoded anywhere else. This file is the picker.
# DEAD MODELS: all GPT, Claude, Gemini on Zen (401 — key lacks premium billing)

probed_at: "2026-07-23T18:30:00Z"
probe_summary:
  zen_total: 57
  zen_alive: 19
  go_total: 23
  go_alive: 20
  total_alive: 39

tiers:
  bulk:
    use: "cron jobs, background scans, high-volume summaries"
    provider: opencode-go
    model: deepseek-v4-flash
    endpoint: chat_completions
    cost: "flat $10/mo subscription"
    note: "Go subscription already paid. Flash is free marginal cost within $60/mo cap."

  default:
    use: "Telegram chat, daily work, casual code"
    provider: opencode-zen
    model: deepseek-v4-flash
    endpoint: chat_completions
    cost: "$0.14/M input, $0.28/M output"
    note: "Anti-mahal: flash not pro for casual chat."

  heavy:
    use: "code generation, audits, long-context reasoning"
    provider: opencode-zen
    model: deepseek-v4-pro
    endpoint: chat_completions
    cost: "$1.74/M input, $3.48/M output"
    fallback: minimax-m3
    fallback_cost: "$0.30/M input, $1.20/M output"
    note: "Pro for heavy work. Fallback to MiniMax M3 if pro is slow/429."

  apex:
    use: "rare governed judgments, constitutional reasoning"
    provider: opencode-zen
    model: grok-4.5
    endpoint: chat_completions
    cost: "$2.00/M input, $6.00/M output"
    fallback: glm-5.2
    fallback_cost: "$1.40/M input, $4.40/M output"
    note: "Claude unavailable on this Zen key (401 — needs billing). Grok-4.5 is best available for apex reasoning."

